apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/odh-cli?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[rhoai-3.5-ea.1]"
  labels:
    appstudio.openshift.io/application: rhoai-v3-5-ea-1
    appstudio.openshift.io/component: odh-cli-v3-5-ea-1
    pipelines.appstudio.openshift.io/type: build
  name: odh-cli-pull-request
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 4h
    tasks: 2h
  params:
  - name: git-url
    value: 'https://github.com/red-hat-data-services/odh-cli.git'
  - name: revision
    value: '{{target_branch}}'
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:odh-cli-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: rhoai-version
    value: "3.5.0-ea.1"
  - name: dockerfile
    value: Dockerfile.konflux
  - name: path-context
    value: .
  - name: hermetic
    value: true
  - name: prefetch-input
    value: |
      [
        {
          "type": "rpm",
          "path": "."
        },
        {
          "type": "gomod",
          "path": "."
        },
        {
          "type": "gomod",
          "path": "./yq"
        },
        {
          "type": "pip",
          "path": ".",
          "requirements_files": [
            "requirements.txt"
          ],
          "requirements_build_files": [
            "requirements-build.txt"
          ],
          "binary": {}
        }
      ]
  - name: build-source-image
    value: true
  - name: build-image-index
    value: true
  - name: build-platforms
    value:
    - linux/x86_64
    - linux-m2xlarge/arm64
  - name: enable-slack-failure-notification
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ revision }}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-pull-request-pipelines
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
