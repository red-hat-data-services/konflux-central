apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: params-multi-arch-container-build
spec:
  params:
  - name: dockerfile
    value: ./canary-build/Dockerfile.konflux
  - name: path-context
    value: .
  - name: build-platforms
    value:
      - linux/amd64
  tasks:
    - name: pipeline
      pipelineRef:
        resolver: git
        params:
        - name: url
          value: https://github.com/red-hat-data-services/konflux-central.git
        - name: revision
          value: '{{ revision }}'
        - name: pathInRepo
          value: pipelines/multi-arch-container-build.yaml
