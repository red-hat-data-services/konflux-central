apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/RHOAI-Build-Config?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "rhoai-3.4"
      && ( "rhaii-helm-chart/**".pathChanged() || ".tekton/rhaii-helm-chart-v3-4-push.yaml".pathChanged() )
      && !"helm/values-patch.yaml".pathChanged()
      && !".github/workflows/**".pathChanged()
  labels:
    appstudio.openshift.io/application: rhoai-v3-4
    appstudio.openshift.io/component: rhaii-helm-chart-v3-4
    pipelines.appstudio.openshift.io/type: build
  name: rhaii-helm-chart-v3-4-on-push
  namespace: rhoai-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: output-image
    value: quay.io/rhoai/rhaii-helm-chart:{{target_branch}}
  - name: rhoai-version
    value: "3.4.0"
  - name: path-context
    value: "helm/rhaii-helm-chart"
  - name: hermetic
    value: false
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{ target_branch }}'
    - name: pathInRepo
      value: pipelines/helm-chart-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-rhaii-helm-chart-v3-4
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
