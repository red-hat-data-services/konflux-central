apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/odh-dashboard?rev={{revision}}
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-target-branch: "[main]"
  labels:
    appstudio.openshift.io/application: automation
    appstudio.openshift.io/component: pull-request-pipelines-dockerfile-test
    pipelines.appstudio.openshift.io/type: build
  name: bad-dockerfile-on-pull-request-22222
  namespace: rhoai-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:dockerfile-test-{{revision}}
  - name: dockerfile
    value: Dockerfile.nonexistent.xyz
  - name: path-context
    value: some/fake/directory
  pipelineRef:
    name: container-build
