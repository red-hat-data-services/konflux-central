apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: multi-arch-container-build
spec:
  description: |
    This pipeline is ideal for building multi-arch container images from a Containerfile while maintaining trust after pipeline customization.

    _Uses `buildah` to create a multi-platform container image leveraging [trusted artifacts](https://konflux-ci.dev/architecture/ADR/0036-trusted-artifacts.html). It also optionally creates a source image and runs some build-time tests. This pipeline requires that the [multi platform controller](https://github.com/konflux-ci/multi-platform-controller) is deployed and configured on your Konflux instance. Information is shared between tasks using OCI artifacts instead of PVCs. EC will pass the [`trusted_task.trusted`](https://conforma.dev/docs/policy/packages/release_trusted_task.html#trusted_task__trusted) policy as long as all data used to build the artifact is generated from trusted tasks.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta?tab=tags)_
  params:
  - description: Source Repository URL
    name: git-url
    type: string
  - default: ""
    description: Revision of the Source Repository
    name: revision
    type: string
  - description: Fully Qualified Output Image
    name: output-image
    type: string
  - default: .
    description: Path to the source code of an application's component from where to build image.
    name: path-context
    type: string
  - default: Dockerfile
    description: Path to the Dockerfile inside the context specified by parameter path-context
    name: dockerfile
    type: string
  - default: "true"
    description: Execute the build with network isolation
    name: hermetic
    type: string
  - default: ""
    description: Build dependencies to be prefetched by Cachi2
    name: prefetch-input
    type: string
  - name: prefetch-log-level
    default: "info"
    type: string
    description: Set cachi2 log level (debug, info, warning, error)
  - name: prefetch-config-file-content
    default: ""
    type: string
    description: Pass configuration to cachi2. Note this needs to be passed as a YAML-formatted config dump, not as a file path!
  - name: prefetch-mode
    default: "strict"
    type: string
    description: Cachi2 prefetch mode. Use "permissive" for source builds that need to regenerate lockfiles (e.g. Cargo.lock). Default "strict" preserves existing behavior.
  - default: ""
    description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
    name: image-expires-after
  - default: "true"
    description: Build a source image.
    name: build-source-image
    type: string
  - default: "true"
    description: Add built image into an OCI image index
    name: build-image-index
    type: string
  - default: []
    description: Array of --build-arg values ("arg=value" strings) for buildah
    name: build-args
    type: array
  - default: ""
    description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
    name: build-args-file
    type: string
  - default: "false"
    description: Whether to enable privileged mode, should be used only with remote VMs
    name: privileged-nested
    type: string
  - default: "does-not-exist"
    description: Kubernetes secret to mount into build, see https://www.redhat.com/en/blog/sensitive-data-containers
    name: additional-build-secret
    type: string
  - default: "synk-secret"
    description: Synk Token Secret Name
    name: synk-secret
  - name: build-platforms
    default:
    - linux-extra-fast/amd64
    description: List of platforms to build the container images on. The available set of values is determined by the configuration of the multi-platform-controller.
  - description: Additional labels to add to build image
    name: additional-labels
    type: array
    default: []
  - description: Additional tags to push for build image
    name: additional-tags
    type: array
    default: []
  - description: Fetch all tags for the repo
    name: fetch-git-tags
    type: string
    default: "false"
  - description: Perform a shallow clone, fetching only the most recent N commits
    name: clone-depth
    type: string
    default: "1"
  - name: expected-cluster
    default: ""
    type: string
    description: The cluster that this pipeline is expected to be run from
  - name: buildah-format
    default: docker
    type: string
    description: The format for the resulting image's mediaType. Valid values are oci or docker.
  - name: enable-cache-proxy
    default: 'true'
    description: Enable cache proxy configuration
    type: string
  - name: enable-slack-failure-notification
    default: "true"
    type: string
    description: Show a slack notification on failure
  - default: ''
    description: RHOAI version of the form X.Y.Z (e.g., 3.2.1)
    name: rhoai-version
    type: string
  - name: rhel-subscription-activation-key
    default: 'custom-activation-key'
    type: string
    description: The name of the Kubernetes secret containing org and activationkey for RHEL subscription (used by prefetch-dependencies and buildah for hermetic RPM fetch and builds). See https://konflux-ci.dev/docs/building/activation-keys-subscription/
  - name: params-file
    default: ''
    type: string
    description: A yaml file containing parameters to override/extend the ones defined in this pipelinerun.
  results:
  - description: ""
    name: IMAGE_URL
    value: $(tasks.build-image-index.results.IMAGE_URL)
  - description: ""
    name: IMAGE_DIGEST
    value: $(tasks.build-image-index.results.IMAGE_DIGEST)
  - description: ""
    name: CHAINS-GIT_URL
    value: $(tasks.clone-repository.results.url)
  - description: ""
    name: CHAINS-GIT_COMMIT
    value: $(tasks.clone-repository.results.commit)
  tasks:
  - name: params-init
    params:
    - name: params-file
      value: $(params.params-file)
    taskSpec:
      params:
        - name: params-file
      results:
        - name: hermetic
        - name: prefetch-input
        - name: prefetch-mode
        - name: prefetch-config-file-content
        - name: prefetch-log-level
        - name: build-args
          type: array
        - name: build-args-file
        - name: build-platforms
          type: array
        - name: additional-labels
          type: array
        - name: fetch-git-tags
        - name: clone-depth
        - name: additional-build-secret
        - name: rhel-subscription-activation-key
        - name: path-context
        - name: dockerfile
      steps:
      - name: params-init
        image: quay.io/rhoai-devops/base-runner:latest
        args:
        # hermetic
        - "--name"
        - "hermetic"
        - "--path"
        - "$(results.hermetic.path)"
        - "--value"
        - "$(params.hermetic)"
        # prefetch-input
        - "--name"
        - "prefetch-input"
        - "--path"
        - "$(results.prefetch-input.path)"
        - "--value"
        - "$(params.prefetch-input)"
        # prefetch-mode
        - "--name"
        - "prefetch-mode"
        - "--path"
        - "$(results.prefetch-mode.path)"
        - "--value"
        - "$(params.prefetch-mode)"
        # prefetch-config-file-content
        - "--name"
        - "prefetch-config-file-content"
        - "--path"
        - "$(results.prefetch-config-file-content.path)"
        - "--value"
        - "$(params.prefetch-config-file-content)"
        # prefetch-log-level
        - "--name"
        - "prefetch-log-level"
        - "--path"
        - "$(results.prefetch-log-level.path)"
        - "--value"
        - "$(params.prefetch-log-level)"
        # build-args
        - "--name"
        - "build-args"
        - "--path"
        - "$(results.build-args.path)"
        - "--array"
        - "--value"
        - "$(params.build-args[*])"
        # build-args-file
        - "--name"
        - "build-args-file"
        - "--path"
        - "$(results.build-args-file.path)"
        - "--value"
        - "$(params.build-args-file)"
        # build-platforms
        - "--name"
        - "build-platforms"
        - "--path"
        - "$(results.build-platforms.path)"
        - "--array"
        - "--value"
        - "$(params.build-platforms[*])"
        # additional-labels
        - "--name"
        - "additional-labels"
        - "--path"
        - "$(results.additional-labels.path)"
        - "--array"
        - "--value"
        - "$(params.additional-labels[*])"
        # fetch-git-tags
        - "--name"
        - "fetch-git-tags"
        - "--path"
        - "$(results.fetch-git-tags.path)"
        - "--value"
        - "$(params.fetch-git-tags)"
        # clone-depth
        - "--name"
        - "clone-depth"
        - "--path"
        - "$(results.clone-depth.path)"
        - "--value"
        - "$(params.clone-depth)"
        # additional-build-secret
        - "--name"
        - "additional-build-secret"
        - "--path"
        - "$(results.additional-build-secret.path)"
        - "--value"
        - "$(params.additional-build-secret)"
        # rhel-subscription-activation-key
        - "--name"
        - "rhel-subscription-activation-key"
        - "--path"
        - "$(results.rhel-subscription-activation-key.path)"
        - "--value"
        - "$(params.rhel-subscription-activation-key)"
        # path-context
        - "--name"
        - "path-context"
        - "--path"
        - "$(results.path-context.path)"
        - "--value"
        - "$(params.path-context)"
        # dockerfile
        - "--name"
        - "dockerfile"
        - "--path"
        - "$(results.dockerfile.path)"
        - "--value"
        - "$(params.dockerfile)"
        env:
        - name: HOME
          value: /tekton/home
        - name: PARAMS_FILE
          value: $(params.params-file)
        - name: REPO_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['pipelinesascode.tekton.dev/source-repo-url']
        - name: REPO_SHA
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['pipelinesascode.tekton.dev/sha']
        script: |
          #!/usr/bin/env python3
          import json, os, subprocess, sys

          # Parse param groups: --name <n> --path <p> [--array] --value <v...>
          PARAMS = []
          argv = sys.argv[1:]
          i = 0
          while i < len(argv):
              if argv[i] == "--name":
                  name = argv[i + 1]
                  i += 2
                  assert argv[i] == "--path", f"Expected --path after --name {name}"
                  path = argv[i + 1]
                  i += 2
                  is_array = False
                  if i < len(argv) and argv[i] == "--array":
                      is_array = True
                      i += 1
                  assert argv[i] == "--value", f"Expected --value for {name}"
                  i += 1
                  values = []
                  while i < len(argv) and argv[i] != "--name":
                      values.append(argv[i])
                      i += 1
                  default = values if is_array else values[0]
                  PARAMS.append({"name": name, "result_path": path, "default": default})
              else:
                  i += 1

          REPO_URL = os.environ["REPO_URL"]
          REPO_SHA = os.environ["REPO_SHA"]
          PARAMS_FILE = os.environ["PARAMS_FILE"]

          subprocess.run(["git", "init", "."], check=True)
          subprocess.run(["git", "remote", "add", "origin", REPO_URL], check=True)
          subprocess.run(["git", "fetch", "origin", REPO_SHA], check=True)

          def serialize(value):
              if isinstance(value, list):
                  return json.dumps(value, separators=(",", ":"))
              return str(value)

          # Write initial defaults
          print("Initially setting params to what is defined in the pipelinerun:")
          for p in PARAMS:
              value = serialize(p["default"])
              print(f"  {p['name']}: {value}")
              with open(p["result_path"], "w") as f:
                  f.write(value)

          # Try to checkout params file
          print(f"Attempting to checkout the file '{PARAMS_FILE}' at {REPO_SHA}")
          result = subprocess.run(["git", "checkout", REPO_SHA, "--", PARAMS_FILE], capture_output=True)
          if result.returncode != 0:
              print(f"Warning: Params file '{PARAMS_FILE}' was blank or does not exist in the repo. Falling back to pipeline defaults.")
              sys.exit(0)

          # Convert YAML to JSON using yq
          params_json = PARAMS_FILE + ".json"
          with open(params_json, "w") as f:
              subprocess.run(["yq", "-o=json", PARAMS_FILE], check=True, stdout=f)

          with open(params_json) as f:
              overrides = {item["name"]: item["value"] for item in json.load(f) if "value" in item}

          print(f"Overriding params from '{PARAMS_FILE}':")
          for p in PARAMS:
              if p["name"] not in overrides:
                  print(f"  {p['name']}: not found in params file, skipping")
                  continue
              value = serialize(overrides[p["name"]])
              print(f"  {p['name']}: {value}")
              with open(p["result_path"], "w") as f:
                  f.write(value)

          # Log total results size (Tekton limit is 4096 bytes)
          total = sum(os.path.getsize(p["result_path"]) for p in PARAMS)
          print(f"\nTotal results size: {total} / 4096 bytes ({total * 100 // 4096}% used)")
          if total > 4096:
              print(f"WARNING: Results size exceeds 4096 byte Tekton limit by {total - 4096} bytes!")
              # sys.exit(1)

  - name: rhoai-init
    runAfter:
      - params-init
    params:
    - name: expected-cluster
      value: $(params.expected-cluster)
    - name: rhoai-version
      value: $(params.rhoai-version)
    - name: image-output
      value: $(params.output-image)
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
      - name: revision
        value: cd777af52bd87919ec2b494d460f671a840205d5
      - name: pathInRepo
        value: konflux-tekton-tasks/rhoai-init/0.1/rhoai-init.yaml
  - name: init
    params:
    - name: image-url
      value: $(params.output-image)
    taskRef:
      params:
      - name: name
        value: init
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:f2de909151c733da85c7c05de8ecf37c55079c219dcf8db906175ae11fca0142
      - name: kind
        value: task
      resolver: bundles
    runAfter:
    - rhoai-init
  - name: clone-repository
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    - name: ociStorage
      value: $(params.output-image).git
    - name: ociArtifactExpiresAfter
      value: $(params.image-expires-after)
    - name: fetchTags
      value: $(tasks.params-init.results.fetch-git-tags)
    - name: depth
      value: $(tasks.params-init.results.clone-depth)
    runAfter:
    - init
    taskRef:
      params:
      - name: name
        value: git-clone-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:f3f28a40fb7b4c8a5c1ec935df5576139bb6ba5b80f3531f42da2f1f2448a53b
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: basic-auth
      workspace: git-auth
  - name: prefetch-dependencies
    params:
    - name: input
      value: $(tasks.params-init.results.prefetch-input)
    - name: ACTIVATION_KEY
      value: $(tasks.params-init.results.rhel-subscription-activation-key)
    - name: dev-package-managers
      value: "true"
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
    - name: ociStorage
      value: $(params.output-image).prefetch
    - name: ociArtifactExpiresAfter
      value: $(params.image-expires-after)
    - name: log-level
      value: $(tasks.params-init.results.prefetch-log-level)
    - name: config-file-content
      value: $(tasks.params-init.results.prefetch-config-file-content)
    - name: mode
      value: $(tasks.params-init.results.prefetch-mode)
    runAfter:
    - clone-repository
    taskRef:
      params:
      - name: name
        value: prefetch-dependencies-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta:0.2@sha256:22612d629796a29ddd177d6e29c18a4319875d4e2348286ea01d16427cec0dc1
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: git-basic-auth
      workspace: git-auth
    - name: netrc
      workspace: netrc
  - matrix:
      params:
      - name: PLATFORM
        value:
        - $(tasks.params-init.results.build-platforms[*])
    name: build-images
    timeout: 8h
    params:
    - name: ADDITIONAL_SECRET
      value: $(tasks.params-init.results.additional-build-secret)
    - name: IMAGE
      value: $(params.output-image)
    - name: DOCKERFILE
      value: $(tasks.params-init.results.dockerfile)
    - name: CONTEXT
      value: $(tasks.params-init.results.path-context)
    - name: HERMETIC
      value: $(tasks.params-init.results.hermetic)
    - name: PREFETCH_INPUT
      value: $(tasks.params-init.results.prefetch-input)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: BUILD_ARGS
      value:
      - $(tasks.params-init.results.build-args[*])
    - name: BUILD_ARGS_FILE
      value: $(tasks.params-init.results.build-args-file)
    - name: PRIVILEGED_NESTED
      value: $(params.privileged-nested)
    - name: ACTIVATION_KEY
      value: $(tasks.params-init.results.rhel-subscription-activation-key)
    - name: LABELS
      value:
      - $(tasks.params-init.results.additional-labels[*])
      - version=v$(params.rhoai-version)
      - url=$(params.git-url)
      - release=$(tasks.clone-repository.results.commit-timestamp)
      - git.url=$(params.git-url)
      - git.commit=$(params.revision)
      - cpe=$(tasks.rhoai-init.results.cpe-id)
      - name=$(tasks.rhoai-init.results.image-namespace)/$(tasks.rhoai-init.results.image-name)
      - io.openshift.tags=$(tasks.rhoai-init.results.image-name-without-rhel-suffix)
      - com.redhat.component=$(tasks.rhoai-init.results.konflux-component-name)
      - summary=$(tasks.rhoai-init.results.display-name)
      - description=$(tasks.rhoai-init.results.display-name)
      - io.k8s.display-name=$(tasks.rhoai-init.results.display-name)
      - io.k8s.description=$(tasks.rhoai-init.results.display-name)
      - "vendor=Red Hat, Inc."
      - "maintainer=RHOAI DevTestOps Team [openshift-ai-devtestops@redhat.com]"
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: IMAGE_APPEND_PLATFORM
      value: "true"
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    runAfter:
    - prefetch-dependencies
    taskRef:
      params:
      - name: name
        value: buildah-remote-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-buildah-remote-oci-ta:0.8@sha256:c6236e9037466c9f5360154bd857ffeae84817f849712d25707cc35de7cb9c76
      - name: kind
        value: task
      resolver: bundles
  - name: build-image-index
    params:
    - name: IMAGE
      value: $(params.output-image)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: ALWAYS_BUILD_INDEX
      value: $(params.build-image-index)
    - name: IMAGES
      value:
      - $(tasks.build-images.results.IMAGE_REF[*])
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    runAfter:
    - build-images
    taskRef:
      params:
      - name: name
        value: build-image-index
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.2@sha256:020a1b4126cc6b7c7a919c2b549b94e6b7b826aaaa0d0f2e67d1980df967e498
      - name: kind
        value: task
      resolver: bundles
  - name: build-source-image
    params:
    - name: BINARY_IMAGE
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: BINARY_IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: source-build-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-source-build-oci-ta:0.3@sha256:0201377594e6e0e9d304aa23b2363e4f47e02f3ebb6fe5a410480c1a17c9edfb
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.build-source-image)
      operator: in
      values:
      - "true"
  - name: deprecated-base-image-check
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: deprecated-image-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-deprecated-image-check:0.5@sha256:5ff16b7e6b4a8aa1adb352e74b9f831f77ff97bafd1b89ddb0038d63335f1a67
      - name: kind
        value: task
      resolver: bundles
  - name: clair-scan
    matrix:
      params:
      - name: image-platform
        value:
        - $(tasks.params-init.results.build-platforms[*])
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: clair-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-clair-scan:0.3@sha256:cd49cdea7e5403a87c4774bd8ea10bc4e6aeb83841ff490cbe42b782779513a7
      - name: kind
        value: task
      resolver: bundles
  - name: ecosystem-cert-preflight-checks
    timeout: 2h
    matrix:
      params:
      - name: platform
        value:
        - $(tasks.params-init.results.build-platforms[*])
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: ecosystem-cert-preflight-checks
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-ecosystem-cert-preflight-checks:0.2@sha256:2d439dce35dc07bec38dcf450bcba949851686141a256d87eb6f42e5a217f6e2
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: "true"
      operator: in
      values:
      - "false"
  - name: sast-snyk-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-snyk-check-oci-ta
      - name: bundle
