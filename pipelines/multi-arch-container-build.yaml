apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: multi-arch-container-build
spec:
  description: |
    This pipeline is ideal for building multi-arch container images from a Containerfile while maintaining trust after pipeline customization.

    _Uses `buildah` to create a multi-platform container image leveraging [trusted artifacts](https://konflux-ci.dev/architecture/ADR/0036-trusted-artifacts.html). It also optionally creates a source image and runs some build-time tests. This pipeline requires that the [multi platform controller](https://github.com/konflux-ci/multi-platform-controller) is deployed and configured on your Konflux instance. Information is shared between tasks using OCI artifacts instead of PVCs. EC will pass the [`trusted_task.trusted`](https://conforma.dev/docs/policy/packages/release_trusted_task.html#trusted_task__trusted) policy as long as all data used to build the artifact is generated from trusted tasks.
    This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build-multi-platform-oci-ta?tab=tags)_
  params:
  - description: Source Repository URL
    name: git-url
    type: string
  - default: ""
    description: Revision of the Source Repository
    name: revision
    type: string
  - description: Fully Qualified Output Image
    name: output-image
    type: string
  - default: .
    description: Path to the source code of an application's component from where to build image.
    name: path-context
    type: string
  - default: Dockerfile
    description: Path to the Dockerfile inside the context specified by parameter path-context
    name: dockerfile
    type: string
  - default: "true"
    description: Execute the build with network isolation
    name: hermetic
    type: string
  - default: ""
    description: Build dependencies to be prefetched by Cachi2
    name: prefetch-input
    type: string
  - name: prefetch-log-level
    default: "info"
    type: string
    description: Set cachi2 log level (debug, info, warning, error)
  - name: prefetch-config-file-content
    default: ""
    type: string
    description: Pass configuration to cachi2. Note this needs to be passed as a YAML-formatted config dump, not as a file path!
  - name: prefetch-mode
    default: "strict"
    type: string
    description: Cachi2 prefetch mode. Use "permissive" for source builds that need to regenerate lockfiles (e.g. Cargo.lock). Default "strict" preserves existing behavior.
  - default: ""
    description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
    name: image-expires-after
  - default: "true"
    description: Build a source image.
    name: build-source-image
    type: string
  - default: "true"
    description: Add built image into an OCI image index
    name: build-image-index
    type: string
  - default: []
    description: Array of --build-arg values ("arg=value" strings) for buildah
    name: build-args
    type: array
  - default: ""
    description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
    name: build-args-file
    type: string
  - default: "false"
    description: Whether to enable privileged mode, should be used only with remote VMs
    name: privileged-nested
    type: string
  - default: "does-not-exist"
    description: Kubernetes secret to mount into build, see https://www.redhat.com/en/blog/sensitive-data-containers
    name: additional-build-secret
    type: string
  - default: "synk-secret"
    description: Synk Token Secret Name
    name: synk-secret
  - name: build-platforms
    default:
    - linux-extra-fast/amd64
    description: List of platforms to build the container images on. The available set of values is determined by the configuration of the multi-platform-controller.
  - description: Additional labels to add to build image
    name: additional-labels
    type: array
    default: []
  - description: Additional tags to push for build image
    name: additional-tags
    type: array
    default: []
  - description: Fetch all tags for the repo
    name: fetch-git-tags
    type: string
    default: "false"
  - description: Perform a shallow clone, fetching only the most recent N commits
    name: clone-depth
    type: string
    default: "1"
  - name: expected-cluster
    default: ""
    type: string
    description: The cluster that this pipeline is expected to be run from
  - name: buildah-format
    default: docker
    type: string
    description: The format for the resulting image's mediaType. Valid values are oci or docker.
  - name: enable-cache-proxy
    default: 'true'
    description: Enable cache proxy configuration
    type: string
  - default: ''
    description: RHOAI version of the form X.Y.Z (e.g., 3.2.1)
    name: rhoai-version
    type: string
  - name: rhel-subscription-activation-key
    default: 'custom-activation-key'
    type: string
    description: The name of the Kubernetes secret containing org and activationkey for RHEL subscription (used by prefetch-dependencies and buildah for hermetic RPM fetch and builds). See https://konflux-ci.dev/docs/building/activation-keys-subscription/
  - default: 'false'
    description: Disable all slack notifications
    name: disable-slack-notifications
    type: string
  - name: fips-check-blocking
    default: "true"
    type: string
    description: When true, a FIPS check-payload failure will fail the pipeline
  - name: sast-target-dirs
    type: string
    default: .
    description: Target directories to scan with SAST tools. Multiple values should be separated with commas.
  - name: enable-package-registry-proxy
    default: 'true'
    description: Use the package registry proxy when prefetching dependencies
    type: string
  results:
  - description: ""
    name: IMAGE_URL
    value: $(tasks.build-image-index.results.IMAGE_URL)
  - description: ""
    name: IMAGE_DIGEST
    value: $(tasks.build-image-index.results.IMAGE_DIGEST)
  - description: ""
    name: CHAINS-GIT_URL
    value: $(tasks.clone-repository.results.url)
  - description: ""
    name: CHAINS-GIT_COMMIT
    value: $(tasks.clone-repository.results.commit)
  tasks:
  - name: rhoai-init
    params:
    - name: expected-cluster
      value: $(params.expected-cluster)
    - name: rhoai-version
      value: $(params.rhoai-version)
    - name: image-output
      value: $(params.output-image)
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
      - name: revision
        value: 0ad9c78e5276367cd475f3f8706dd93cf4784b63
      - name: pathInRepo
        value: konflux-tekton-tasks/rhoai-init/0.1/rhoai-init.yaml
  - name: init
    params:
    - name: image-url
      value: $(params.output-image)
    taskRef:
      params:
      - name: name
        value: init
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:5a423246792ac501ea279229b42ee57da9927da441c04b5c9ff86817b0856b08
      - name: kind
        value: task
      resolver: bundles
    runAfter:
    - rhoai-init
  - name: clone-repository
    params:
    - name: url
      value: $(params.git-url)
    - name: revision
      value: $(params.revision)
    - name: ociStorage
      value: $(params.output-image).git
    - name: ociArtifactExpiresAfter
      value: $(params.image-expires-after)
    - name: fetchTags
      value: $(params.fetch-git-tags)
    - name: depth
      value: $(params.clone-depth)
    runAfter:
    - init
    taskRef:
      params:
      - name: name
        value: git-clone-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta:0.1@sha256:13d49df7dc9ae301627e45f95a236011422996152f1bea46cd60217b0f057407
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: basic-auth
      workspace: git-auth
  - name: prefetch-dependencies
    params:
    - name: input
      value: $(params.prefetch-input)
    - name: ACTIVATION_KEY
      value: $(params.rhel-subscription-activation-key)
    - name: SOURCE_ARTIFACT
      value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
    - name: ociStorage
      value: $(params.output-image).prefetch
    - name: ociArtifactExpiresAfter
      value: $(params.image-expires-after)
    - name: log-level
      value: $(params.prefetch-log-level)
    - name: config-file-content
      value: $(params.prefetch-config-file-content)
    - name: mode
      value: $(params.prefetch-mode)
    - name: enable-package-registry-proxy
      value: $(params.enable-package-registry-proxy)
    runAfter:
    - clone-repository
    taskRef:
      params:
      - name: name
        value: prefetch-dependencies-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta:0.3@sha256:a2efbcdcecfa5293a622eb356a18f5c88e5714046b214fe8730b43b1a7dbb77d
      - name: kind
        value: task
      resolver: bundles
    workspaces:
    - name: git-basic-auth
      workspace: git-auth
    - name: netrc
      workspace: netrc
  - matrix:
      params:
      - name: PLATFORM
        value:
        - $(params.build-platforms)
    name: build-images
    timeout: 8h
    params:
    - name: ADDITIONAL_SECRET
      value: $(params.additional-build-secret)
    - name: IMAGE
      value: $(params.output-image)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    - name: HERMETIC
      value: $(params.hermetic)
    - name: PREFETCH_INPUT
      value: $(params.prefetch-input)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: BUILD_ARGS
      value:
      - $(params.build-args[*])
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
    - name: PRIVILEGED_NESTED
      value: $(params.privileged-nested)
    - name: ACTIVATION_KEY
      value: $(params.rhel-subscription-activation-key)
    - name: LABELS
      value:
      - $(params.additional-labels[*])
      - version=v$(params.rhoai-version)
      - url=$(params.git-url)
      - release=$(tasks.clone-repository.results.commit-timestamp)
      - git.url=$(params.git-url)
      - git.commit=$(params.revision)
      - cpe=$(tasks.rhoai-init.results.cpe-id)
      - name=$(tasks.rhoai-init.results.image-namespace)/$(tasks.rhoai-init.results.image-name)
      - io.openshift.tags=$(tasks.rhoai-init.results.image-name-without-rhel-suffix)
      - com.redhat.component=$(tasks.rhoai-init.results.konflux-component-name)
      - summary=$(tasks.rhoai-init.results.display-name)
      - description=$(tasks.rhoai-init.results.display-name)
      - io.k8s.display-name=$(tasks.rhoai-init.results.display-name)
      - io.k8s.description=$(tasks.rhoai-init.results.display-name)
      - "vendor=Red Hat, Inc."
      - "maintainer=RHOAI DevTestOps Team [openshift-ai-devtestops@redhat.com]"
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: IMAGE_APPEND_PLATFORM
      value: "true"
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    runAfter:
    - prefetch-dependencies
    taskRef:
      params:
      - name: name
        value: buildah-remote-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-buildah-remote-oci-ta:0.9@sha256:f667d1146533b1d49829c08097e31faf27db24563da576434a707353de62099f
      - name: kind
        value: task
      resolver: bundles
  - name: build-image-index
    params:
    - name: IMAGE
      value: $(params.output-image)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: ALWAYS_BUILD_INDEX
      value: $(params.build-image-index)
    - name: IMAGES
      value:
      - $(tasks.build-images.results.IMAGE_REF[*])
    - name: BUILDAH_FORMAT
      value: $(params.buildah-format)
    runAfter:
    - build-images
    taskRef:
      params:
      - name: name
        value: build-image-index
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-build-image-index:0.2@sha256:020a1b4126cc6b7c7a919c2b549b94e6b7b826aaaa0d0f2e67d1980df967e498
      - name: kind
        value: task
      resolver: bundles
  - name: build-source-image
    params:
    - name: BINARY_IMAGE
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: BINARY_IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: source-build-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-source-build-oci-ta:0.3@sha256:0917cfc7772e82cb8e74743c2104f43bcf2596aceafe87eec6fce69a8cac5f06
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(params.build-source-image)
      operator: in
      values:
      - "true"
  - name: deprecated-base-image-check
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: deprecated-image-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-deprecated-image-check:0.5@sha256:e78d0d3baf3c8cfc1a5ad278196b74032d9568b143a87c7a79ab780fedfb296e
      - name: kind
        value: task
      resolver: bundles
  - name: clair-scan
    matrix:
      params:
      - name: image-platform
        value:
        - $(params.build-platforms)
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: clair-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-clair-scan:0.3@sha256:8fad4c2e2f470f82ee43d6b2ac72327b4d9c6e9cb514a678911c1c9359c29894
      - name: kind
        value: task
      resolver: bundles
  - name: ecosystem-cert-preflight-checks
    timeout: 2h
    matrix:
      params:
      - name: platform
        value:
        - $(params.build-platforms)
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: ecosystem-cert-preflight-checks
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-ecosystem-cert-preflight-checks:0.2@sha256:9c300728a03f41beee9a689422d66513d32ab5f804664fe561b11cebacd07799
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: "true"
      operator: in
      values:
      - "false"
  - name: sast-snyk-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: TARGET_DIRS
      value: $(params.sast-target-dirs)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-snyk-check-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-snyk-check-oci-ta:0.4@sha256:8f3ecbeaff579e41b8278f82d7fabac27845db17a8e687ea6c510c0c9aceabbb
      - name: kind
        value: task
      resolver: bundles
  - name: clamav-scan
    timeout: 2h
    matrix:
      params:
      - name: image-arch
        value:
        - $(params.build-platforms)
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: clamav-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-clamav-scan:0.3@sha256:567cb66bd2e1f4b58b9d4d756f3317fc62479e0b40aa0de66094b1f12d296cfc
      - name: kind
        value: task
      resolver: bundles
  - name: sast-coverity-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE
      value: $(params.output-image)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    - name: HERMETIC
      value: $(params.hermetic)
    - name: PREFETCH_INPUT
      value: $(params.prefetch-input)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.image-expires-after)
    - name: COMMIT_SHA
      value: $(tasks.clone-repository.results.commit)
    - name: BUILD_ARGS
      value:
      - $(params.build-args[*])
    - name: BUILD_ARGS_FILE
      value: $(params.build-args-file)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: TARGET_DIRS
      value: $(params.sast-target-dirs)
    runAfter:
    - coverity-availability-check
    taskRef:
      params:
      - name: name
        value: sast-coverity-check-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-coverity-check-oci-ta:0.3@sha256:e92d00ed858233d0096627861192d3e4fc013cf1559c0d0b0ea0657d3377ce75
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: "true"
      operator: in
      values:
      - "false"
    - input: $(tasks.coverity-availability-check.results.STATUS)
      operator: in
      values:
      - success
  - name: coverity-availability-check
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: coverity-availability-check
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-coverity-availability-check:0.2@sha256:8b501440a960aec446db2ebc6625a49d0317a9fc7bf0f7bd9b18cb63052db7de
      - name: kind
        value: task
      resolver: bundles
  - name: sast-shell-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: TARGET_DIRS
      value: $(params.sast-target-dirs)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-shell-check-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-shell-check-oci-ta:0.1@sha256:c4ef47e3b4e0508572d266fb745be7e374c29dc02580328cbe9f4d472a8aca57
      - name: kind
        value: task
      resolver: bundles
  - name: sast-unicode-check
    params:
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    - name: CACHI2_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
    - name: TARGET_DIRS
      value: $(params.sast-target-dirs)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: sast-unicode-check-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-sast-unicode-check-oci-ta:0.3@sha256:5e46c39508dfb8031102ec4e11ba98edabb1299615cafe174166f8df49ea3215
      - name: kind
        value: task
      resolver: bundles
  - name: apply-tags
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: ADDITIONAL_TAGS
      value:
      - $(params.additional-tags[*])
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: apply-tags
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-apply-tags:0.3@sha256:a291081de7fb27f832c6fc3c4b078acf7e6162ca4c085db38b118ca87e8b5b66
      - name: kind
        value: task
      resolver: bundles
  - name: push-dockerfile
    params:
    - name: IMAGE
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: IMAGE_DIGEST
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: DOCKERFILE
      value: $(params.dockerfile)
    - name: CONTEXT
      value: $(params.path-context)
    - name: SOURCE_ARTIFACT
      value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: push-dockerfile-oci-ta
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-push-dockerfile-oci-ta:0.3@sha256:7855471abfe87de080b914f2f3ca27c59e64f6448a7c2435e51435b764494c71
      - name: kind
        value: task
      resolver: bundles
  - name: rpms-signature-scan
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    runAfter:
    - build-image-index
    taskRef:
      params:
      - name: name
        value: rpms-signature-scan
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-rpms-signature-scan:0.2@sha256:d4e3499ad4af6869470233bef6faaa1bdd69ef56276841eeec93ce6e62deeb93
      - name: kind
        value: task
      resolver: bundles
  - name: fips-check
    matrix:
      params:
      - name: image-platform
        value:
        - $(params.build-platforms)
    params:
    - name: image-url
      value: $(tasks.build-image-index.results.IMAGE_URL)
    - name: image-digest
      value: $(tasks.build-image-index.results.IMAGE_DIGEST)
    - name: blocking
      value: $(params.fips-check-blocking)
    runAfter:
    - build-image-index
    taskSpec:
      params:
      - name: image-platform
        type: string
      - name: image-url
        type: string
      - name: image-digest
        type: string
      - name: blocking
        type: string
        default: "true"
      steps:
      - name: prepare-image-list
        image: quay.io/konflux-ci/konflux-test:v1.5.0@sha256:fbd5ad045b902065990218922aa6f343e8eb5fd039ecd445bc54819b8e968c3e
        env:
        - name: IMAGE_PLATFORM
          value: $(params.image-platform)
        - name: IMAGE_URL
          value: $(params.image-url)
        - name: IMAGE_DIGEST
          value: $(params.image-digest)
        script: |
          ARCH="${IMAGE_PLATFORM#*/}"
          if [ "${ARCH}" = "x86_64" ]; then ARCH="amd64"; fi
          case "${ARCH}" in
            amd64|ppc64le|arm64|s390x) ;;
            *) ARCH="amd64" ;;
          esac
          IMAGE_WITHOUT_TAG=$(echo "${IMAGE_URL}" | sed 's/\(.*\):.*/\1/')
          PLATFORM_DIGEST=$(skopeo inspect --raw "docker://${IMAGE_WITHOUT_TAG}@${IMAGE_DIGEST}" | jq -r ".manifests[] | select(.platform.architecture == \"${ARCH}\") | .digest")
          if [ -z "${PLATFORM_DIGEST}" ]; then
            echo "Could not find digest for architecture ${ARCH} in ${IMAGE_URL}@${IMAGE_DIGEST}"
            exit 1
          fi
          printf '%s' "${IMAGE_WITHOUT_TAG}@${PLATFORM_DIGEST}" > /tekton/home/unique_related_images.txt
      - name: run-fips-check
        image: quay.io/konflux-ci/konflux-test:v1.4.50@sha256:8b9c7be18bef49f60ac9926830174072cc2010c620c7b3d0a5bb53ba02fcf71d
        workingDir: /tekton/home
        securityContext:
          capabilities:
            add:
            - SETFCAP
        env:
        - name: MAX_PARALLEL
          value: "8"
        results:
        - name: TEST_OUTPUT
          description: Tekton task test output.
        script: |
          #!/usr/bin/env bash
          set -euo pipefail

          cat > /tekton/home/config.toml << 'FIPS_CONFIG'
          certified_distributions = [
            "Red Hat Enterprise Linux release 8.4 (Ootpa)",
            "Red Hat Enterprise Linux release 8.5 (Ootpa)",
            "Red Hat Enterprise Linux release 8.6 (Ootpa)",
            "Red Hat Enterprise Linux release 8.7 (Ootpa)",
            "Red Hat Enterprise Linux release 8.9 (Ootpa)",
            "Red Hat Enterprise Linux release 8.10 (Ootpa)",
            "Red Hat Enterprise Linux release 9.0 (Plow)",
            "Red Hat Enterprise Linux release 9.2 (Plow)",
            "Red Hat Enterprise Linux release 9.4 (Plow)",
            "Red Hat Enterprise Linux release 9.5 (Plow)",
            "Red Hat Enterprise Linux release 9.6 (Plow)",
            "Red Hat Enterprise Linux release 9.7 (Plow)",
            "Red Hat Enterprise Linux release 9.8 (Plow)",
          ]

          filter_dirs = [
            "/lib/firmware",
            "/lib/modules",
            "/usr/lib/.build-id",
            "/usr/lib/firmware",
            "/usr/lib/grub",
            "/usr/lib/modules",
            "/usr/share/app-info",
            "/usr/share/doc",
            "/usr/share/fonts",
            "/usr/share/icons",
            "/usr/share/openshift",
            "/usr/src/plugins",
            "/rootfs",
            "/sysroot",
          ]

          [[rpm.tini.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/bin/tini-static"]

          [[rpm.glibc-common.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/sbin/build-locale-archive"]

          [[rpm.glibc.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/sbin/ldconfig", "/sbin/ldconfig"]

          [[rpm.runc.ignore]]
          error = "ErrGoMissingTag"
          files = ["/usr/bin/runc"]

          [[rpm.runc.ignore]]
          error = "ErrGoInvalidTag"
          files = ["/usr/bin/runc"]

          [[rpm.runc.ignore]]
          error = "ErrGoMissingSymbols"
          files = ["/usr/bin/runc"]

          [[rpm.runc.ignore]]
          error = "ErrLibcryptoMissing"
          files = ["/usr/bin/runc"]

          [[rpm.podman.ignore]]
          error = "ErrGoMissingTag"
          files = ["/usr/bin/podman", "/usr/libexec/podman/quadlet", "/usr/libexec/podman/rootlessport"]

          [[rpm.podman.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/libexec/podman/catatonit"]

          [[rpm.podman.ignore]]
          error = "ErrGoMissingSymbols"
          files = ["/usr/libexec/podman/rootlessport"]

          [[rpm.podman-catatonit.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/libexec/catatonit/catatonit"]

          [[rpm.catatonit.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/libexec/catatonit/catatonit"]

          [[rpm.skopeo.ignore]]
          error = "ErrGoMissingTag"
          files = ["/usr/bin/skopeo"]

          [[rpm.habanalabs-firmware-tools.ignore]]
          error = "ErrNotDynLinked"
          files = ["/usr/bin/hl-smi"]
          FIPS_CONFIG

          . /utils.sh
          export RETRY_COUNT=2
          export RETRY_INTERVAL=5

          counter_dir=$(mktemp -d)
          trap 'rm -rf "$counter_dir"' EXIT

          cleanup_image_artifacts() {
            local image_num="$1" component_label="$2" version_label="$3" release_label="$4"
            rm -rf "/tekton/home/${image_num}-${component_label}-${version_label}-${release_label}" 2>/dev/null || true
            rm -rf "/tekton/home/unpacked-${image_num}-${component_label}-${version_label}-${release_label}" 2>/dev/null || true
          }

          process_image() {
            . /utils.sh
            local related_image="$1" image_num="$2" total_images="$3" check_payload_version="$4" image_mirror_map="$5"
            related_image="${related_image//$'\n'/}"
            echo "Processing related image ${image_num} of ${total_images}: ${related_image}"

            image_accessible=0
            if ! image_labels=$(get_image_labels "$related_image"); then
              echo "Could not inspect original pullspec $related_image. Checking if there's a mirror present"
              if [ -n "${image_mirror_map}" ]; then
                reg_and_repo=$(get_image_registry_and_repository "${related_image}")
                mapfile -t mirrors < <(get_image_mirror_list "${reg_and_repo}" "${image_mirror_map}")
                if [[ -z "${mirrors[0]}" ]]; then
                  echo "No mirrors found in image mirror map for ${reg_and_repo}"
                else
                  for mirror in "${mirrors[@]}"; do
                    replaced_image=$(replace_image_pullspec "$related_image" "$mirror")
                    if ! image_labels=$(get_image_labels "$replaced_image"); then continue; fi
                    image_accessible=1
                    related_image="$replaced_image"
                    break
                  done
                fi
              fi
            else
              image_accessible=1
            fi

            if [[ $image_accessible -eq 0 ]]; then
              echo "Error: Unable to scan image: Could not inspect image ${related_image} for labels"
              echo "1" >> "${counter_dir}/error"
              return
            fi

            component_label=$(echo "${image_labels}" | grep 'com.redhat.component=' | cut -d= -f2 | tr -d '\n\r' | xargs || true)
            version_label=$(echo "${image_labels}" | grep '^version=' | cut -d= -f2 | tr -d '\n\r' | xargs || true)
            release_label=$(echo "${image_labels}" | grep 'release=' | cut -d= -f2 | tr -d '\n\r' | xargs || true)

            sanitized_component_label=$(echo -n "${component_label}" | tr '/\\:*?"<>|[:space:]' '-')
            component_label="${sanitized_component_label}"

            if [ -z "${component_label}" ]; then
              echo "Error: Unable to scan image: Could not get com.redhat.component label for ${related_image}"
              echo "1" >> "${counter_dir}/error"
              return
            fi

            sanitized_related_image=$(get_image_registry_repository_digest "${related_image}")
            if [[ "${sanitized_related_image}" != *"@"* ]]; then
              sanitized_related_image=$(get_image_registry_repository_tag "${related_image}")
            fi

            first_arch=$(get_first_arch "${sanitized_related_image}")

            extract_dir="/tekton/home/unpacked-${image_num}-${component_label}-${version_label}-${release_label}"
            mkdir -p "${extract_dir}"

            extraction_success=1
            if oc image extract "${sanitized_related_image}" --path=/:"${extract_dir}" --filter-by-os=".*/${first_arch}" --confirm --preserve-ownership; then
              extraction_success=0
            else
              rm -rf "${extract_dir}" 2>/dev/null || true
              mkdir -p "${extract_dir}"
              oci_dir="/tekton/home/${image_num}-${component_label}-${version_label}-${release_label}"
              if retry skopeo copy --override-arch "${first_arch}" --remove-signatures "docker://${sanitized_related_image}" "oci://${oci_dir}:latest"; then
                if retry umoci raw unpack --rootless --image "${oci_dir}:latest" "${extract_dir}"; then
                  extraction_success=0
                fi
                rm -rf "${oci_dir}" 2>/dev/null || true
              fi
            fi

            if [[ "${extraction_success}" -ne 0 ]]; then
              echo "Error: Unable to scan image: Could not extract filesystem from ${related_image}"
              cleanup_image_artifacts "${image_num}" "${component_label}" "${version_label}" "${release_label}"
              echo "1" >> "${counter_dir}/error"
              return
            fi

            if ! check-payload scan local \
              --path="/tekton/home/unpacked-${image_num}-${component_label}-${version_label}-${release_label}" \
              ${check_payload_version} \
              --components="${component_label}" \
              --output-format=csv \
              --output-file="/tekton/home/report-${image_num}-${component_label}-${version_label}-${release_label}.csv"; then
              echo "check-payload scan failed for ${related_image}"
              cleanup_image_artifacts "${image_num}" "${component_label}" "${version_label}" "${release_label}"
              echo "1" >> "${counter_dir}/failure"
              return
            fi

            if [ -f "/tekton/home/report-${image_num}-${component_label}-${version_label}-${release_label}.csv" ]; then
              if grep -q -- "---- Successful run" "/tekton/home/report-${image_num}-${component_label}-${version_label}-${release_label}.csv"; then
                echo "1" >> "${counter_dir}/success"
              elif grep -q -- "---- Successful run with warnings" "/tekton/home/report-${image_num}-${component_label}-${version_label}-${release_label}.csv"; then
                echo "1" >> "${counter_dir}/warnings"
              fi
              cleanup_image_artifacts "${image_num}" "${component_label}" "${version_label}" "${release_label}"
            fi
          }

          if [ ! -e "/tekton/home/unique_related_images.txt" ]; then
            echo "No relatedImages to process"
            exit 0
          fi

          mapfile -d ' ' -t related_images < <(cat /tekton/home/unique_related_images.txt)

          check_payload_version=""
          if [ -f "/tekton/home/target_ocp_version.txt" ]; then
            version=$(cat "/tekton/home/target_ocp_version.txt")
            check_payload_version="-V=${version}"
          fi

          image_mirror_map=""
          if [ -f "/tekton/home/related-images-map.txt" ]; then
            image_mirror_map=$(cat "/tekton/home/related-images-map.txt")
          fi

          declare -i count=0
          for related_image in "${related_images[@]}"; do
            count+=1
            while [ "$(jobs -r | wc -l)" -ge "${MAX_PARALLEL}" ]; do wait -n; done
            process_image "$related_image" "$count" "${#related_images[@]}" "$check_payload_version" "$image_mirror_map" &
          done
          wait

          success_counter=0; warnings_counter=0; error_counter=0; failure_counter=0
          [ -f "${counter_dir}/success" ] && success_counter=$(wc -l < "${counter_dir}/success")
          [ -f "${counter_dir}/warnings" ] && warnings_counter=$(wc -l < "${counter_dir}/warnings")
          [ -f "${counter_dir}/error" ] && error_counter=$(wc -l < "${counter_dir}/error")
          [ -f "${counter_dir}/failure" ] && failure_counter=$(wc -l < "${counter_dir}/failure")

          echo "Results: success=${success_counter}, warnings=${warnings_counter}, errors=${error_counter}, failures=${failure_counter}"

          note="Task fips-check failed: Some images could not be scanned. For details, check Tekton task log."
          ERROR_OUTPUT=$(make_result_json -r ERROR -t "$note")

          note="Task fips-check completed: Check result for task result."
          if [[ "$error_counter" == 0 ]]; then
            if [[ "${failure_counter}" -gt 0 ]]; then RES="FAILURE"
            elif [[ "${warnings_counter}" -gt 0 ]]; then RES="WARNING"
            else RES="SUCCESS"; fi
            TEST_OUTPUT=$(make_result_json -r "${RES}" -s "${success_counter}" -f "${failure_counter}" -w "${warnings_counter}" -t "$note")
          fi
          echo "${TEST_OUTPUT:-${ERROR_OUTPUT}}" | tee "$(step.results.TEST_OUTPUT.path)"
      - name: evaluate-result
        image: quay.io/rhoai-konflux/alpine:latest
        env:
        - name: TEST_OUTPUT
          value: $(steps.run-fips-check.results.TEST_OUTPUT)
        - name: BLOCKING
          value: $(params.blocking)
        script: |
          echo "${TEST_OUTPUT}"
          if echo "${TEST_OUTPUT}" | grep -qE '"result":"(FAILURE|ERROR)"'; then
            if [ "${BLOCKING}" = "true" ]; then
              echo "FIPS check failed and blocking is enabled"
              exit 1
            fi
            echo "FIPS check failed but blocking is not enabled, continuing"
          fi
  - name: pipeline-success-indicator
    runAfter:
    - build-source-image
    - sast-shell-check
    - sast-unicode-check
    - deprecated-base-image-check
    - clair-scan
    - ecosystem-cert-preflight-checks
    - sast-snyk-check
    - clamav-scan
    - apply-tags
    - push-dockerfile
    - rpms-signature-scan
    - sast-coverity-check
    - coverity-availability-check
    - fips-check
    taskSpec:
      steps:
      - name: noop
        image: quay.io/rhoai-konflux/alpine:latest
        script: |
          echo "Success"
  finally:
  - name: show-sbom
    params:
    - name: IMAGE_URL
      value: $(tasks.build-image-index.results.IMAGE_URL)
    taskRef:
      params:
      - name: name
        value: show-sbom
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-show-sbom:0.1@sha256:a7346ed61237db4f82ff782e0c9e8b30536e0e67b907ad600341a6d192e80012
      - name: kind
        value: task
      resolver: bundles
  - name: send-slack-notification
    params:
    - name: message
      value: "$(tasks.rhoai-init.results.slack-message-failure-text)"
    - name: secret-name
      value: rhoai-konflux-secret
    - name: key-name
      value: slack-webhook
    taskRef:
      params:
      - name: name
        value: slack-webhook-notification
      - name: bundle
        value: quay.io/konflux-ci/tekton-catalog/task-slack-webhook-notification:0.1@sha256:14766aebbf6f4739e1b7dde0406dcba2d1e300170d3b084f23df9fb074d87dc3
      - name: kind
        value: task
      resolver: bundles
    when:
    - input: $(tasks.pipeline-success-indicator.status)
      operator: notin
      values:
      - "Succeeded"
    - input: $(tasks.rhoai-init.results.skip-slack-message)
      operator: in
      values:
      - "false"
    - input: $(params.disable-slack-notifications)
      operator: notin
      values:
      - "true"
  workspaces:
  - name: git-auth
    optional: true
  - name: netrc
    optional: true
